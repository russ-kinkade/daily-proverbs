<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Proverbs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #1a1209;
      color: #f0e6cc;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }

    header h1 {
      font-size: 2rem;
      font-weight: normal;
      letter-spacing: 0.12em;
      color: #d4a94a;
      text-transform: uppercase;
    }

    header p.subtitle {
      font-size: 0.85rem;
      color: #9e8c6a;
      letter-spacing: 0.08em;
      margin-top: 6px;
      text-transform: uppercase;
    }

    .card {
      background: #231a0d;
      border: 1px solid #3d2f12;
      border-radius: 12px;
      max-width: 760px;
      width: 100%;
      padding: 36px 40px 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    .chapter-label {
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9e8c6a;
      margin-bottom: 6px;
    }

    .chapter-title {
      font-size: 1.7rem;
      color: #d4a94a;
      margin-bottom: 24px;
      font-weight: normal;
    }

    .verses {
      line-height: 1.85;
      font-size: 1.02rem;
      color: #e8d9bc;
    }

    .verse {
      margin-bottom: 10px;
    }

    .verse-num {
      color: #d4a94a;
      font-size: 0.78rem;
      vertical-align: super;
      margin-right: 4px;
      font-family: 'Arial', sans-serif;
      font-weight: bold;
    }

    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 760px;
      width: 100%;
      margin-top: 28px;
      gap: 16px;
    }

    .nav button {
      background: #2e2009;
      border: 1px solid #5c4318;
      color: #d4a94a;
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 0.9rem;
      cursor: pointer;
      letter-spacing: 0.06em;
      transition: background 0.2s, border-color 0.2s;
      font-family: 'Georgia', serif;
    }

    .nav button:hover {
      background: #3d2f12;
      border-color: #d4a94a;
    }

    .nav button:disabled {
      opacity: 0.3;
      cursor: default;
      border-color: #3d2f12;
    }

    .day-indicator {
      text-align: center;
      flex: 1;
    }

    .day-number {
      font-size: 2.4rem;
      color: #d4a94a;
      line-height: 1;
    }

    .day-label {
      font-size: 0.78rem;
      color: #9e8c6a;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .dot-row {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      gap: 6px;
      max-width: 760px;
      width: 100%;
      margin-top: 24px;
    }

    .dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #2e2009;
      border: 1px solid #5c4318;
      cursor: pointer;
      font-size: 0.7rem;
      color: #9e8c6a;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, border-color 0.15s;
      font-family: 'Arial', sans-serif;
    }

    .dot:hover {
      background: #3d2f12;
      border-color: #d4a94a;
      color: #d4a94a;
    }

    .dot.active {
      background: #d4a94a;
      border-color: #d4a94a;
      color: #1a1209;
      font-weight: bold;
    }

    .dot.today {
      border-color: #d4a94a;
      color: #d4a94a;
    }

    .today-btn {
      background: none;
      border: none;
      color: #9e8c6a;
      font-size: 0.78rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      text-decoration: underline;
      font-family: 'Georgia', serif;
      margin-top: 16px;
      display: block;
    }

    .today-btn:hover { color: #d4a94a; }

    footer {
      margin-top: 36px;
      font-size: 0.75rem;
      color: #5c4a2a;
      letter-spacing: 0.06em;
      text-align: center;
    }
  </style>
</head>
<body>

<header>
  <h1>Proverbs</h1>
  <p class="subtitle">New Living Translation &nbsp;·&nbsp; One chapter per day</p>
</header>

<div class="card">
  <div class="chapter-label">Chapter</div>
  <div class="chapter-title" id="chapterTitle"></div>
  <div class="verses" id="versesContainer"></div>
</div>

<nav class="nav">
  <button id="prevBtn" onclick="navigate(-1)">← Previous</button>
  <div class="day-indicator">
    <div class="day-number" id="dayNumber"></div>
    <div class="day-label">Day of Month</div>
  </div>
  <button id="nextBtn" onclick="navigate(1)">Next →</button>
</nav>

<div class="dot-row" id="dotRow"></div>
<button class="today-btn" onclick="goToToday()">Back to Today</button>

<footer>Proverbs NLT &nbsp;·&nbsp; Daily Reading</footer>

    ["27", "I was there when he established the heavens, when he drew the horizon on the oceans."],
    ["28", "I was there when he set the clouds above, when he established the deep fountains of the earth."],
    ["29", "I was there when he set the limits of the seas, so they would not spread beyond their boundaries. And when he marked off the earth's foundations,"],
    ["30", "I was the architect at his side. I was his constant delight, rejoicing always in his presence."],
    ["31", "And how happy I was with what he created—his wide world and all the human family!\""],
    ["32", "\"And so, my children, listen to me, for happy are all who follow my ways."],
    ["33", "Listen to my counsel and be wise. Don't ignore it."],
    ["34", "Happy are those who listen to me, watching for me daily at my gates, waiting for me outside my home!"],
    ["35", "For whoever finds me finds life and wins approval from the LORD."],
    ["36", "But those who miss me have injured themselves. All who hate me love death.\""]
  ],
  9: [
    ["1", "Wisdom has built her spacious house with seven pillars."],
    ["2", "She has prepared a great banquet, mixed the wines, and set the table."],
    ["3", "She has sent her servants to invite everyone to come. She calls out from the heights overlooking the city."],
    ["4", "\"Come home with me,\" she urges the simple. To those without good judgment, she says,"],
    ["5", "\"Come, eat my food, and drink the wine I have mixed."],
    ["6", "Leave your foolish ways behind, and begin to live; learn how to be wise.\""],
    ["7", "Anyone who rebukes a mocker will get a smart retort. Anyone who rebukes the wicked will get hurt."],
    ["8", "So don't bother rebuking mockers; they will only hate you. But the wise, when rebuked, will love you all the more."],
    ["9", "Teach the wise, and they will be wiser. Teach the righteous, and they will learn more."],
    ["10", "Fear of the LORD is the beginning of wisdom. Knowledge of the Holy One results in understanding."],
    ["11", "Wisdom will multiply your days and add years to your life."],
    ["12", "If you become wise, you will be the one to benefit. If you scorn wisdom, you will be the one to suffer."],
    ["13", "The woman named Folly is loud and brash. She is ignorant and doesn't even know it."],
    ["14", "She sits in her doorway on the heights overlooking the city."],
    ["15", "She calls out to men going by who are minding their own business."],
    ["16", "\"Come home with me,\" she urges the simple. To those without good judgment, she says,"],
    ["17", "\"Stolen water is refreshing; food eaten in secret tastes the best!\""],
    ["18", "But the men don't realize that her former guests are now in the grave."]
  ],
  10: [
    ["1", "A wise child brings joy to a father; a foolish child brings grief to a mother."],
    ["2", "Ill-gotten gain has no lasting value, but right living can save your life."],
    ["3", "The LORD will not let the godly starve to death, but he refuses to satisfy the craving of the wicked."],
    ["4", "Lazy people are soon poor; hard workers get rich."],
    ["5", "A wise youth works hard all summer; a youth who sleeps away the hour of opportunity brings shame."],
    ["6", "The godly are showered with blessings; evil people cover up their harmful intentions."],
    ["7", "We all have happy memories of the godly, but the name of a wicked person rots away."],
    ["8", "The wise are glad to be instructed, but babbling fools fall flat on their faces."],
    ["9", "People with integrity have firm footing, but those who follow crooked paths will slip and fall."],
    ["10", "People who wink at wrong cause trouble, but a bold reproof promotes peace."],
    ["11", "The words of the godly lead to life; evil people cover up their harmful intentions."],
    ["12", "Hatred stirs up quarrels, but love covers all offenses."],
    ["13", "Wise words come from the lips of people with understanding, but fools will be punished with a rod."],
    ["14", "Wise people treasure knowledge, but the babbling of a fool invites trouble."],
    ["15", "The wealth of the rich is their fortress; the poverty of the poor is their calamity."],
    ["16", "The earnings of the godly enhance their lives, but evil people squander their money on sin."],
    ["17", "People who accept correction are on the pathway to life, but those who ignore it will lead others astray."],
    ["18", "To hide hatred is to be a liar; to slander is to be a fool."],
    ["19", "Don't talk too much, for it fosters sin. Be sensible and turn off the flow!"],
    ["20", "The words of the godly are like sterling silver; the heart of a fool is worthless."],
    ["21", "The godly give good advice, but fools are destroyed by their lack of common sense."],
    ["22", "The blessing of the LORD makes a person rich, and he adds no sorrow with it."],
    ["23", "Doing wrong is fun for a fool, while wise conduct is a pleasure to the wise."],
    ["24", "The fears of the wicked will all come true; so will the hopes of the godly."],
    ["25", "Disaster strikes like a cyclone, whirling the wicked away, but the godly have a lasting foundation."],
    ["26", "Lazy people are a pain to their employer. They are like smoke in the eyes or vinegar that sets the teeth on edge."],
    ["27", "Fear of the LORD lengthens one's life, but the years of the wicked are cut short."],
    ["28", "The hopes of the godly result in happiness, but the expectations of the wicked are all in vain."],
    ["29", "The LORD protects the upright but destroys the wicked."],
    ["30", "The godly will never be disturbed, but the wicked will be removed from the land."],
    ["31", "The godly person gives wise advice, but the tongue that deceives will be cut off."],
    ["32", "The godly speak words that are helpful, but the wicked speak only what is corrupt."]
  ],
  11: [
    ["1", "The LORD hates cheating, but he delights in honesty."],
    ["2", "Pride leads to disgrace, but with humility comes wisdom."],
    ["3", "Good people are guided by their honesty; treacherous people are destroyed by their dishonesty."],
    ["4", "Riches won't help on the day of judgment, but right living is a safeguard against death."],
    ["5", "The godly are directed by their honesty; the wicked fall beneath their load of sin."],
    ["6", "The godliness of good people rescues them; the ambition of treacherous people traps them."],
    ["7", "When the wicked die, their hopes all perish, for they rely on their own feeble strength."],
    ["8", "God rescues the godly from danger, but he lets the wicked fall into trouble."],
    ["9", "Evil words destroy one's friends; wise discernment rescues the godly."],
    ["10", "The whole city celebrates when the godly succeed; they shout for joy when the godless die."],
    ["11", "Upright citizens bless a city and make it prosper, but the talk of the wicked tears it apart."],
    ["12", "It is foolish to belittle a neighbor; a person with good sense remains silent."],
    ["13", "A gossip goes around revealing secrets, but those who are trustworthy can keep a confidence."],
    ["14", "Without wise leadership, a nation falls; with many counselors, there is safety."],
    ["15", "Guaranteeing a loan for a stranger is dangerous; it is better to refuse than to suffer later."],
    ["16", "Beautiful women obtain wealth, and violent men get rich."],
    ["17", "Your own soul is nourished when you are kind, but you destroy yourself when you are cruel."],
    ["18", "Evil people get rich for the moment, but the reward of the godly will last."],
    ["19", "Godly people find life; evil people find death."],
    ["20", "The LORD hates people with twisted hearts, but he delights in those who have integrity."],
    ["21", "You can be sure that evil people will be punished, but the children of the godly will go free."],
    ["22", "A woman who is beautiful but lacks discretion is like a gold ring in a pig's snout."],
    ["23", "The godly can look forward to happiness, while the wicked can expect only wrath."],
    ["24", "It is possible to give freely and become more wealthy, but those who are stingy will lose everything."],
    ["25", "The generous prosper and are satisfied; those who refresh others will themselves be refreshed."],
    ["26", "People curse those who hold their grain for higher prices, but they bless the one who sells to them in their time of need."],
    ["27", "If you search for good, you will find favor; but if you search for evil, it will find you!"],
    ["28", "Trust in your money and down you go! But the godly flourish like leaves in spring."],
    ["29", "Those who bring trouble on their families inherit only the wind. The fool will be a servant to the wise."],
    ["30", "The godly are like trees that bear life-giving fruit, and those who save lives are wise."],
    ["31", "If the righteous are rewarded here on earth, how much more true that the wicked and the sinner will get what they deserve!"]
  ],
  12: [
    ["1", "To learn, you must love discipline; it is stupid to hate correction."],
    ["2", "The LORD approves of those who are good, but he condemns those who plan wickedness."],
    ["3", "Wickedness never brings stability; only the godly have deep roots."],
    ["4", "A worthy wife is her husband's joy and crown; a shameful wife saps his strength."],
    ["5", "The plans of the godly are just; the advice of the wicked is treacherous."],
    ["6", "The words of the wicked are like a murderous ambush, but the words of the godly save lives."],
    ["7", "The wicked perish and are gone, but the children of the godly stand firm."],
    ["8", "Everyone admires a person with good sense, but a warped mind is despised."],
    ["9", "It is better to be a nobody with a servant than to be self-important but have no food."],
    ["10", "The godly are concerned for the welfare of their animals, but even the kindness of the wicked is cruel."],
    ["11", "Hard work means prosperity; only fools idle away their time."],
    ["12", "Thieves are jealous of each other's loot, while the godly bear their own fruit."],
    ["13", "The wicked are trapped by their own words, but the godly escape such trouble."],
    ["14", "People can get many good things by the words they say; the work of their hands also gives them many benefits."],
    ["15", "Fools think they need no advice, but the wise listen to others."],
    ["16", "A fool is quick-tempered, but a wise person stays calm when insulted."],
    ["17", "An honest witness tells the truth; a false witness tells lies."],
    ["18", "Some people make cutting remarks, but the words of the wise bring healing."],
    ["19", "Truth stands the test of time; lies are soon exposed."],
    ["20", "Deceit fills hearts that are plotting evil; joy fills hearts that are planning peace!"],
    ["21", "No real harm befalls the godly, but the wicked have their fill of trouble."],
    ["22", "The LORD hates those who don't keep their word, but he delights in those who do."],
    ["23", "Wise people don't make a show of their knowledge, but fools broadcast their folly."],
    ["24", "Work hard and become a leader; be lazy and become a slave."],
    ["25", "Worry weighs a person down; an encouraging word cheers a person up."],
    ["26", "The godly give good advice to their friends; the wicked lead them astray."],
    ["27", "Lazy people don't even cook the game they catch, but the diligent make use of everything they find."],
    ["28", "The way of the godly leads to life; their path does not lead to death."]
  ],
  13: [
    ["1", "A wise child accepts a parent's discipline; a young mocker refuses to listen."],
    ["2", "Good people enjoy the positive results of their words, but those who are treacherous crave violence."],
    ["3", "Those who control their tongue will have a long life; a quick retort can ruin everything."],
    ["4", "Lazy people want much but get little, but those who work hard will prosper and be satisfied."],
    ["5", "Those who are godly hate lies; the wicked come to shame and disgrace."],
    ["6", "Godliness helps people all through life, while the evil are destroyed by their wickedness."],
    ["7", "Some who are poor pretend to be rich; others who are rich pretend to be poor."],
    ["8", "The rich can pay a ransom, but the poor won't even get threatened."],
    ["9", "The life of the godly is full of light and joy, but the sinner's light is snuffed out."],
    ["10", "Pride leads to arguments; those who take advice are wise."],
    ["11", "Wealth from get-rich-quick schemes quickly disappears; wealth from hard work grows."],
    ["12", "Hope deferred makes the heart sick, but when dreams come true, there is life and joy."],
    ["13", "People who despise advice will find themselves in trouble; those who respect it will succeed."],
    ["14", "The advice of the wise is like a life-giving fountain; those who accept it avoid the snares of death."],
    ["15", "A person with good sense is respected; a treacherous person walks a rocky road."],
    ["16", "Wise people think before they act; fools don't and even brag about it!"],
    ["17", "An unreliable messenger stumbles into trouble, but a reliable messenger brings healing."],
    ["18", "If you ignore criticism, you will end in poverty and disgrace; if you accept criticism, you will be honored."],
    ["19", "It is pleasant to see dreams come true, but fools will not turn from evil to attain them."],
    ["20", "Whoever walks with the wise will become wise; whoever walks with fools will suffer harm."],
    ["21", "Trouble chases sinners, while blessings chase the righteous!"],
    ["22", "Good people leave an inheritance to their grandchildren, but the sinner's wealth passes to the godly."],
    ["23", "A poor person's farm may produce much food, but injustice sweeps it all away."],
    ["24", "If you refuse to discipline your children, it proves you don't love them; if you love your children, you will be prompt to discipline them."],
    ["25", "The godly eat to their hearts' content, but the belly of the wicked goes hungry."]
  ],
  14: [
    ["1", "A wise woman builds her house; a foolish woman tears hers down with her own hands."],
    ["2", "Those who follow the right path fear the LORD; those who take the wrong path despise him."],
    ["3", "The talk of fools is a rod for their backs, but the words of the wise keep them out of trouble."],
    ["4", "An empty stable stays clean, but no income comes from an empty stable."],
    ["5", "A truthful witness does not lie; a false witness breathes lies."],
    ["6", "A mocker seeks wisdom and never finds it, but knowledge comes easily to those with understanding."],
    ["7", "Stay away from fools, for you won't find knowledge there."],
    ["8", "The wise look ahead to see what is coming, but fools deceive themselves."],
    ["9", "Fools make fun of guilt, but the godly acknowledge it and seek reconciliation."],
    ["10", "Each heart knows its own bitterness, and no one else can fully share its joy."],
    ["11", "The house of the wicked will perish, but the tent of the godly will flourish."],
    ["12", "There is a path before each person that seems right, but it ends in death."],
    ["13", "Laughter can conceal a heavy heart; when the laughter ends, the grief remains."],
    ["14", "Backsliders get what they deserve; good people receive their reward."],
    ["15", "Only simpletons believe everything they are told! The prudent carefully consider their steps."],
    ["16", "The wise are cautious and avoid danger; fools plunge ahead with great confidence."],
    ["17", "Those who are short-tempered do foolish things, and schemers are hated."],
    ["18", "The simpleton is clothed with folly, but the wise person is crowned with knowledge."],
    ["19", "Evil people will bow before good people; the wicked will bow at the gates of the godly."],
    ["20", "The poor are despised even by their neighbors, while the rich have many \"friends.\""],
    ["21", "It is sin to despise one's neighbors; blessed are those who help the poor."],
    ["22", "If you plot evil, you will be lost; but if you plan good, you will be granted unfailing love and faithfulness."],
    ["23", "Work brings profit, but mere talk leads to poverty!"],
    ["24", "Wealth is a crown for the wise; the effort of fools yields only folly."],
    ["25", "A truthful witness saves lives, but a false witness is a traitor."],
    ["26", "Those who fear the LORD are secure; he will be a place of refuge for their children."],
    ["27", "Fear of the LORD is a life-giving fountain; it offers escape from the snares of death."],
    ["28", "A growing population is a king's glory; a dwindling nation is his doom."],
    ["29", "Those who control their anger have great understanding; those with a hasty temper will make mistakes."],
    ["30", "A relaxed attitude lengthens life; jealousy rots it away."],
    ["31", "Those who oppress the poor insult their Maker, but those who help the poor honor him."],
    ["32", "The wicked are crushed by their sins, but the godly have a refuge when they die."],
    ["33", "Wisdom is enshrined in an understanding heart; wisdom is not found among fools."],
    ["34", "Godliness exalts a nation, but sin is a disgrace to any people."],
    ["35", "A king rejoices in servants who know what they are doing; he is angry with those who cause trouble."]
  ],
  15: [
    ["1", "A gentle answer turns away wrath, but harsh words stir up anger."],
    ["2", "The wise person makes learning a joy; fools spout only foolishness."],
    ["3", "The LORD is watching everywhere, keeping his eye on both the evil and the good."],
    ["4", "Gentle words bring life and health; a deceitful tongue crushes the spirit."],
    ["5", "Only a fool despises a parent's discipline; whoever learns from correction is wise."],
    ["6", "There is treasure in the house of the godly, but the earnings of the wicked bring trouble."],
    ["7", "Only the wise can give good advice; fools cannot do so."],
    ["8", "The LORD hates the sacrifice of the wicked, but he delights in the prayers of the upright."],
    ["9", "The LORD despises the way of the wicked, but he loves those who pursue godliness."],
    ["10", "Whoever abandons the right path will be severely punished; whoever hates correction will die."],
    ["11", "Even the depths of Death and Destruction are known by the LORD. How much more does he know the human heart!"],
    ["12", "Mockers don't love those who rebuke them, so they stay away from the wise."],
    ["13", "A glad heart makes a happy face; a broken heart crushes the spirit."],
    ["14", "A wise person is hungry for truth, while the fool feeds on trash."],
    ["15", "For the poor, every day brings trouble; for the happy heart, life is a continual feast."],
    ["16", "It is better to have little with fear for the LORD than to have great treasure with turmoil."],
    ["17", "A bowl of soup with someone you love is better than steak with someone you hate."],
    ["18", "A hothead starts fights; a cool-tempered person tries to stop them."],
    ["19", "A lazy person has trouble all through life; the path of the upright is easy!"],
    ["20", "Sensible children bring joy to their father; foolish children despise their mother."],
    ["21", "Foolishness brings joy to those who have no sense; a sensible person stays on the right path."],
    ["22", "Plans go wrong for lack of advice; many counselors bring success."],
    ["23", "Everyone enjoys a fitting reply; it is wonderful to say the right thing at the right time!"],
    ["24", "The path of the wise leads to life above; they leave the grave behind."],
    ["25", "The LORD destroys the house of the proud, but he protects the property of widows."],
    ["26", "The LORD despises the thoughts of the wicked, but he delights in pure words."],
    ["27", "Dishonest money brings grief to the whole family, but those who hate bribes will live."],
    ["28", "The godly think before speaking; the wicked spout evil words."],
    ["29", "The LORD is far from the wicked, but he hears the prayers of the righteous."],
    ["30", "A cheerful look brings joy to the heart; good news makes for good health."],
    ["31", "If you listen to constructive criticism, you will be at home among the wise."],
    ["32", "If you reject criticism, you only harm yourself; but if you listen to correction, you grow in understanding."],
    ["33", "Fear of the LORD teaches a person to be wise; humility precedes honor."]
  ],
  16: [
    ["1", "We can gather our thoughts, but the LORD gives the right answer."],
    ["2", "People may be pure in their own eyes, but the LORD examines their motives."],
    ["3", "Commit your work to the LORD, and then your plans will succeed."],
    ["4", "The LORD has made everything for his own purposes, even the wicked for punishment."],
    ["5", "The LORD despises pride; be assured that the proud will be punished."],
    ["6", "Unfailing love and faithfulness cover sin; evil is avoided by fear of the LORD."],
    ["7", "When the ways of people please the LORD, he makes even their enemies live at peace with them."],
    ["8", "It is better to be poor and godly than rich and dishonest."],
    ["9", "We can make our plans, but the LORD determines our steps."],
    ["10", "The king speaks with divine wisdom; he must never judge unfairly."],
    ["11", "The LORD demands fairness in every business deal; he sets the standard."],
    ["12", "A king despises wrongdoing, for his rule depends on his justice."],
    ["13", "The king is pleased with righteous lips; he loves those who speak honestly."],
    ["14", "The anger of the king is a deadly threat; the wise do what they can to appease it."],
    ["15", "When the king smiles, there is life; his favor refreshes like a gentle rain."],
    ["16", "How much better to get wisdom than gold, and understanding than silver!"],
    ["17", "The path of the upright leads away from evil; whoever follows that path is safe."],
    ["18", "Pride goes before destruction, and haughtiness before a fall."],
    ["19", "It is better to live humbly with the poor than to share plunder with the proud."],
    ["20", "Those who listen to instruction will prosper; those who trust the LORD will be happy."],
    ["21", "The wise are known for their understanding, and instruction is appreciated if it's well presented."],
    ["22", "Discretion is a life-giving fountain to those who possess it, but discipline is wasted on fools."],
    ["23", "From a wise mind comes wise speech; the words of the wise are persuasive."],
    ["24", "Kind words are like honey—sweet to the soul and healthy for the body."],
    ["25", "There is a path before each person that seems right, but it ends in death."],
    ["26", "It is good for workers to have an appetite; an empty stomach drives them on."],
    ["27", "Scoundrels hunt for scandal; their words are a destructive blaze."],
    ["28", "A troublemaker plants seeds of strife; gossip separates the best of friends."],
    ["29", "Violent people deceive their companions, leading them down a harmful path."],
    ["30", "With narrowed eyes, they plot evil; without a word, they plan their mischief."],
    ["31", "Gray hair is a crown of glory; it is gained by living a godly life."],
    ["32", "It is better to be patient than powerful; it is better to have self-control than to conquer a city."],
    ["33", "We may throw the dice, but the LORD determines how they fall."]
  ],
  17: [
    ["1", "A dry crust eaten in peace is better than a great feast with strife."],
    ["2", "A wise slave will rule over the master's shameful sons and will share their inheritance."],
    ["3", "Fire tests the purity of silver and gold, but the LORD tests the heart."],
    ["4", "Wrongdoers listen to wicked talk; liars pay attention to destructive words."],
    ["5", "Those who mock the poor insult their Maker; those who rejoice at the misfortune of others will be punished."],
    ["6", "Grandchildren are the crowning glory of the aged; parents are the pride of their children."],
    ["7", "Eloquent speech is not fitting for a fool; even less are lies fitting for a ruler."],
    ["8", "A bribe seems to work like magic for those who give it; they succeed in all they do."],
    ["9", "Disregarding another person's faults preserves love; telling about them separates close friends."],
    ["10", "A single rebuke does more for a person of understanding than a hundred lashes on the back of a fool."],
    ["11", "Evil people seek rebellion, but they will be severely punished."],
    ["12", "It is safer to meet a bear robbed of her cubs than to confront a fool caught in folly."],
    ["13", "If you repay evil for good, evil will never leave your house."],
    ["14", "Beginning a quarrel is like opening a floodgate, so drop the matter before a dispute breaks out."],
    ["15", "The LORD despises those who acquit the guilty and condemn the innocent."],
    ["16", "It is senseless to pay tuition to educate a fool who has no heart for wisdom."],
    ["17", "A friend is always loyal, and a brother is born to help in time of need."],
    ["18", "It is poor judgment to co-sign a friend's note, to become responsible for a neighbor's debts."],
    ["19", "Anyone who loves to quarrel loves sin; anyone who speaks boastfully invites disaster."],
    ["20", "The crooked heart will not prosper; the twisted tongue tumbles into trouble."],
    ["21", "It is painful to be the parent of a fool; there is no joy for the father of a rebel."],
    ["22", "A cheerful heart is good medicine, but a broken spirit saps a person's strength."],
    ["23", "The wicked accept secret bribes to pervert justice."],
    ["24", "Sensible people keep their eyes glued on wisdom, but a fool's eyes wander to the ends of the earth."],
    ["25", "A foolish child brings grief to a father and bitterness to a mother."],
    ["26", "It is wrong to fine the godly for being good or to punish nobles for being honest!"],
    ["27", "A truly wise person uses few words; a person with understanding is even-tempered."],
    ["28", "Even fools are thought to be wise when they keep silent; when they keep their mouths shut, they seem intelligent."]
  ],
  18: [
    ["1", "A recluse is self-indulgent, snarling at every sound principle of conduct."],
    ["2", "Fools have no interest in understanding; they only want to air their own opinions."],
    ["3", "When the wicked arrive, contempt, shame, and disgrace are sure to follow."],
    ["4", "A person's words can be life-giving water; words of true wisdom are as refreshing as a bubbling brook."],
    ["5", "It is wrong for a judge to favor the guilty or condemn the innocent."],
    ["6", "Fools get into constant quarrels; they are asking for a beating."],
    ["7", "The mouths of fools are their ruin; their lips get them into trouble."],
    ["8", "What dainty morsels rumors are—but they sink deep into one's heart."],
    ["9", "A lazy person is as bad as someone who destroys things."],
    ["10", "The name of the LORD is a strong fortress; the godly run to him and are safe."],
    ["11", "The rich think of their wealth as an impregnable defense; they imagine it is a high wall of safety."],
    ["12", "Haughtiness goes before destruction; humility precedes honor."],
    ["13", "What a shame, what folly, to give advice before listening to the facts!"],
    ["14", "The human spirit can endure a sick body, but who can bear it if the spirit is crushed?"],
    ["15", "Intelligent people are always open to new ideas. In fact, they look for them."],
    ["16", "Giving a gift works wonders; it may bring you before important people!"],
    ["17", "Any story sounds true until someone sets the record straight."],
    ["18", "Casting lots can end arguments and settle disputes between powerful opponents."],
    ["19", "It's harder to make amends with an offended friend than to capture a fortified city. Arguments separate friends like a gate locked with iron bars."],
    ["20", "Words satisfy the soul as food satisfies the stomach; the right words on a person's lips bring satisfaction."],
    ["21", "Those who love to talk will experience the consequences, for the tongue can kill or nourish life."],
    ["22", "The man who finds a wife finds a treasure and receives favor from the LORD."],
    ["23", "The poor plead for mercy; the rich answer with insults."],
    ["24", "There are \"friends\" who destroy each other, but a real friend sticks closer than a brother."]
  ],
  19: [
    ["1", "It is better to be poor and honest than to be a fool and dishonest."],
    ["2", "Zeal without knowledge is not good; a person who moves too quickly may go the wrong way."],
    ["3", "People ruin their lives by their own foolishness and then are angry at the LORD."],
    ["4", "Wealth makes many \"friends\"; poverty drives them away."],
    ["5", "A false witness will not go unpunished, nor will a liar escape."],
    ["6", "Many beg favors from a prince; everyone is the friend of a person who gives gifts!"],
    ["7", "If the relatives of the poor despise them, how much more will their friends avoid them. The poor call after them, but they are gone."],
    ["8", "To acquire wisdom is to love oneself; people who cherish understanding will prosper."],
    ["9", "A false witness will not go unpunished, and a liar will be destroyed."],
    ["10", "It isn't right for a fool to live in luxury or for a slave to rule over princes!"],
    ["11", "People with good sense restrain their anger; they earn esteem by overlooking wrongs."],
    ["12", "The king's anger is like a lion's roar, but his favor is like dew on the grass."],
    ["13", "A foolish child is a calamity to a father; a nagging wife annoys like a constant dripping."],
    ["14", "Parents can provide their sons with an inheritance of houses and wealth, but only the LORD can give an understanding wife."],
    ["15", "A lazy person sleeps soundly and goes hungry."],
    ["16", "Keep the commandments and keep your life; despising them leads to death."],
    ["17", "If you help the poor, you are lending to the LORD and he will repay you!"],
    ["18", "Discipline your children while there is hope. If you don't, you will ruin their lives."],
    ["19", "Short-tempered people must pay their own penalty. If you rescue them once, you will have to do it again."],
    ["20", "Get all the advice and instruction you can, and be wise the rest of your life."],
    ["21", "You can make many plans, but the LORD's purpose will prevail."],
    ["22", "Loyalty makes a person attractive. And it is better to be poor than dishonest."],
    ["23", "Fear of the LORD gives life, security, and protection from harm."],
    ["24", "Some people are so lazy that they won't even lift a finger to feed themselves."],
    ["25", "If you punish a mocker, the simpleminded will learn a lesson; if you reprove the wise, they will be all the wiser."],
    ["26", "Children who mistreat their father or chase away their mother are a public disgrace and an embarrassment."],
    ["27", "If you stop listening to instruction, my child, you have turned your back on knowledge."],
    ["28", "A corrupt witness makes a mockery of justice; the mouth of the wicked gulps down evil."],
    ["29", "Mockers will be punished, and the backs of fools will be beaten."]
  ],
  20: [
    ["1", "Wine produces mockers; liquor leads to brawls. Whoever is led astray by drink cannot be wise."],
    ["2", "The king's fury is like a lion's roar; to rouse his anger is to risk your life."],
    ["3", "Avoiding a fight is a mark of honor; only fools insist on quarreling."],
    ["4", "If you are too lazy to plow in the right season, you will have no food at the harvest."],
    ["5", "Though good advice lies deep within a person's heart, the wise will draw it out."],
    ["6", "Many will say they are loyal friends, but who can find one who is really faithful?"],
    ["7", "The godly walk with integrity; blessed are their children after them."],
    ["8", "When a king judges, he carefully weighs all the evidence, distinguishing the bad from the good."],
    ["9", "Who can say, \"I have cleansed my heart; I am pure and free from sin\"?"],
    ["10", "The LORD despises double standards of every kind."],
    ["11", "Even children are known by the way they act, whether their conduct is pure and right."],
    ["12", "Ears to hear and eyes to see—both are gifts from the LORD."],
    ["13", "If you love sleep, you will end in poverty. Keep your eyes open, and there will be plenty to eat!"],
    ["14", "The buyer haggles over the price, saying, \"It's worthless,\" then brags about getting a bargain!"],
    ["15", "Wise speech is rarer and more valuable than gold and rubies."],
    ["16", "Be sure to get collateral from anyone who guarantees the debt of a stranger. Get a deposit if someone guarantees the debt of a foreigner."],
    ["17", "Stolen bread tastes sweet, but it turns to gravel in the mouth."],
    ["18", "Plans succeed through good counsel; don't go to war without the advice of others."],
    ["19", "A gossip tells secrets, so don't hang around with someone who talks too much."],
    ["20", "If you curse your father or mother, the lamp of your life will be snuffed out."],
    ["21", "An inheritance obtained early in life is not a blessing in the end."],
    ["22", "Don't say, \"I will get even for this wrong.\" Wait for the LORD to handle the matter."],
    ["23", "The LORD despises double standards; he is not pleased by dishonest scales."],
    ["24", "How can we understand the road we travel? It is the LORD who directs our steps."],
    ["25", "It is dangerous to make a rash promise to God before counting the cost."],
    ["26", "A wise king finds the wicked, lays them out like wheat, then runs the crushing wheel over them."],
    ["27", "The LORD's searchlight penetrates the human spirit, exposing every hidden motive."],
    ["28", "Unfailing love and faithfulness protect the king; his throne is made secure through love."],
    ["29", "The glory of the young is their strength; the gray hair of experience is the splendor of the old."],
    ["30", "Physical punishment cleanses away evil; such discipline purifies the heart."]
  ],
  21: [
    ["1", "The king's heart is like a stream of water directed by the LORD; he turns it wherever he pleases."],
    ["2", "People may think they are doing what is right, but the LORD examines the heart."],
    ["3", "The LORD is more pleased when we do what is just and right than when we give him sacrifices."],
    ["4", "Haughty eyes, a proud heart, and evil actions are all sin."],
    ["5", "Good planning and hard work lead to prosperity, but hasty shortcuts lead to poverty."],
    ["6", "Wealth created by lying is a vanishing mist and a deadly trap."],
    ["7", "Because the wicked refuse to do what is just, their violence boomerangs and destroys them."],
    ["8", "The guilty walk a crooked path; the innocent travel a straight road."],
    ["9", "It is better to live alone in the corner of an attic than with a contentious wife in a lovely home."],
    ["10", "Evil people love to harm others; their neighbors get no mercy from them."],
    ["11", "A simpleton can learn only by seeing mockers punished; a wise person learns from instruction."],
    ["12", "The Righteous One knows what is going on in the homes of the wicked; he will bring the wicked to disaster."],
    ["13", "Those who shut their ears to the cries of the poor will be ignored in their own time of need."],
    ["14", "A secret gift calms anger; a secret bribe pacifies fury."],
    ["15", "Justice is a joy to the godly, but it causes dismay among evildoers."],
    ["16", "The person who strays from common sense will end up in the company of the dead."],
    ["17", "Those who love pleasure become poor; wine and luxury are not the way to riches."],
    ["18", "Sometimes the wicked are punished to save the godly, and the treacherous for the upright."],
    ["19", "It is better to live alone in the desert than with a crabby, complaining wife."],
    ["20", "The wise have wealth and luxury, but fools spend whatever they get."],
    ["21", "Whoever pursues godliness and unfailing love will find life, godliness, and honor."],
    ["22", "The wise conquer the city of the strong and level the fortress in which they trust."],
    ["23", "If you keep your mouth shut, you will stay out of trouble."],
    ["24", "Mockers are proud and haughty; they act with boundless arrogance."],
    ["25", "The desires of lazy people will be their ruin, for their hands refuse to work."],
    ["26", "They are always greedy for more, while the godly love to give!"],
    ["27", "God loathes the sacrifice of an evil person, especially when it is brought with ulterior motives."],
    ["28", "A false witness will be cut off, but an attentive witness will be allowed to speak."],
    ["29", "The wicked put up a bold front, but the upright proceed with care."],
    ["30", "Human plans, no matter how wise or well advised, cannot stand against the LORD."],
    ["31", "The horses are prepared for battle, but the victory belongs to the LORD."]
  ],
  22: [
    ["1", "Choose a good reputation over great riches, for being held in high esteem is better than having silver or gold."],
    ["2", "The rich and the poor have this in common: The LORD made them both."],
    ["3", "A prudent person foresees the danger ahead and takes precautions; the simpleton goes blindly on and suffers the consequences."],
    ["4", "True humility and fear of the LORD lead to riches, honor, and long life."],
    ["5", "The deceitful walk a thorny, treacherous road; whoever values life will stay away."],
    ["6", "Teach your children to choose the right path, and when they are older, they will remain upon it."],
    ["7", "Just as the rich rule the poor, so the borrower is servant to the lender."],
    ["8", "Those who plant seeds of injustice will harvest disaster, and their reign of terror will end."],
    ["9", "Blessed are those who are generous, because they feed the poor."],
    ["10", "Throw out the mocker, and fighting, quarrels, and insults will disappear."],
    ["11", "Anyone who loves a pure heart and gracious speech is the king's friend."],
    ["12", "The LORD preserves knowledge, but he ruins the plans of the deceitful."],
    ["13", "The lazy person is full of excuses, saying, \"If I go outside, I might meet a lion in the street and be killed!\""],
    ["14", "The mouth of an immoral woman is a deep pit; those living under the LORD's displeasure will fall into it."],
    ["15", "A youngster's heart is filled with foolishness, but discipline will drive it away."],
    ["16", "A person who gets ahead by oppressing the poor or by showering gifts on the rich will end in poverty."],
    ["17", "Listen to the words of the wise; apply your heart to my instruction."],
    ["18", "For it is good to keep these sayings deep within yourself, always ready on your lips."],
    ["19", "I am teaching you today—yes, you—so you will trust in the LORD."],
    ["20", "I have written thirty sayings for you, filled with advice and knowledge."],
    ["21", "In this way, you may know the truth and bring an accurate report to those who sent you."],
    ["22", "Do not rob the poor because they are poor or exploit the needy in court."],
    ["23", "For the LORD is their defender. He will injure anyone who injures them."],
    ["24", "Keep away from angry, short-tempered people,"],
    ["25", "or you will learn to be like them and endanger your soul."],
    ["26", "Do not co-sign another person's note or put up a guarantee for someone else's loan."],
    ["27", "If you can't pay it, even your bed will be snatched from under you."],
    ["28", "Do not steal your neighbor's property by moving the ancient boundary markers set up by your ancestors."],
    ["29", "Do you see any truly competent workers? They will serve kings rather than ordinary people."]
  ],
  23: [
    ["1", "When dining with a ruler, pay attention to what is put before you."],
    ["2", "If you are a big eater, put a knife to your throat,"],
    ["3", "and don't desire all the delicacies—deception may be involved."],
    ["4", "Don't weary yourself trying to get rich. Why waste your time?"],
    ["5", "For riches can disappear as though they had the wings of a bird!"],
    ["6", "Don't eat with people who are stingy; don't desire their delicacies."],
    ["7", "\"Eat and drink,\" they say, but they don't mean it. They are always thinking about how much it costs."],
    ["8", "You will vomit up the delicious food they serve, and you will have to take back your words of appreciation for their \"kindness.\""],
    ["9", "Don't waste your breath on fools, for they will despise the wisest advice."],
    ["10", "Don't steal the land of defenseless orphans by moving the ancient boundary markers,"],
    ["11", "for their Redeemer is strong. He himself will bring their charges against you."],
    ["12", "Commit yourself to instruction; attune your ears to hear words of knowledge."],
    ["13", "Don't fail to correct your children. They won't die if you spank them."],
    ["14", "Physical discipline may well save them from death."],
    ["15", "My child, how I will rejoice if you become wise."],
    ["16", "Yes, my heart will thrill when you speak what is right and just."],
    ["17", "Don't envy sinners, but always continue to fear the LORD."],
    ["18", "For surely you have a future ahead of you; your hope will not be disappointed."],
    ["19", "My child, listen and be wise. Keep your heart on the right course."],
    ["20", "Do not carouse with drunkards and gluttons,"],
    ["21", "for they are on their way to poverty. Too much sleep clothes a person with rags."],
    ["22", "Listen to your father, who gave you life, and don't despise your mother's experience when she is old."],
    ["23", "Get the truth and don't ever sell it; also get wisdom, discipline, and discernment."],
    ["24", "The father of godly children has cause for joy. What a pleasure it is to have wise children."],
    ["25", "So give your parents joy! May she who gave you birth be happy."],
    ["26", "O my son, give me your heart. May your eyes delight in my ways of wisdom."],
    ["27", "A prostitute is a deep pit; an adulterous woman is treacherous."],
    ["28", "She hides and waits like a robber, looking for another victim who will be unfaithful to his wife."],
    ["29", "Who has anguish? Who has sorrow? Who is always fighting? Who is always complaining? Who has unnecessary bruises? Who has bloodshot eyes?"],
    ["30", "It is the one who spends long hours in the taverns, trying out new drinks."],
    ["31", "Don't let the sparkle and smooth taste of wine deceive you."],
    ["32", "For in the end it bites like a poisonous serpent; it stings like a viper."],
    ["33", "You will see hallucinations, and you will say crazy things."],
    ["34", "You will stagger like a sailor tossed at sea, clinging to a swaying mast."],
    ["35", "And you will say, \"They hit me, but I didn't feel it. I didn't even know it when they beat me up. When will I wake up so I can have another drink?\""]
  ],
  24: [
    ["1", "Don't envy evil people; don't desire their company."],
    ["2", "For they spend their days plotting violence, and their words are always stirring up trouble."],
    ["3", "A house is built by wisdom and becomes strong through good sense."],
    ["4", "Through knowledge its rooms are filled with all sorts of precious riches and valuables."],
    ["5", "A wise man is mightier than a strong man, and a man of knowledge is more powerful than a strong man."],
    ["6", "So don't go to war without wise guidance; victory depends on having many counselors."],
    ["7", "Wisdom is too much for a fool. When the leaders gather, the fool has nothing to say."],
    ["8", "A person who plans evil will get a reputation as a troublemaker."],
    ["9", "The schemes of a fool are sinful; everyone despises a mocker."],
    ["10", "If you fail under pressure, your strength is not very great."],
    ["11", "Rescue those who are unjustly sentenced to death; don't stand back and let them die."],
    ["12", "Don't try to avoid responsibility by saying you didn't know about it. For God knows all hearts, and he sees you. He keeps watch over your soul, and he knows you knew! And he will judge all people according to what they have done."],
    ["13", "My child, eat honey, for it is good, and the honeycomb is sweet to the taste."],
    ["14", "In the same way, wisdom is sweet to your soul. If you find it, you will have a bright future, and your hopes will not be cut short."],
    ["15", "Do not lie in wait like an outlaw at the home of the godly. And don't raid the house where the godly live."],
    ["16", "They may trip seven times, but each time they will rise again. But one calamity is enough to lay the wicked low."],
    ["17", "Do not rejoice when your enemies fall into trouble. Don't be happy when they stumble."],
    ["18", "For the LORD will be displeased with you and will turn his anger away from them."],
    ["19", "Do not fret because of evildoers; don't envy the wicked."],
    ["20", "For the evil have no future; their light will be snuffed out."],
    ["21", "My child, fear the LORD and the king, and don't associate with rebels."],
    ["22", "For you will go down with them to sudden disaster. Who knows where the punishment from the LORD and the king will end?"],
    ["23", "Here are some further sayings of the wise: It is wrong to show favoritism when passing judgment."],
    ["24", "A judge who says to the wicked, \"You are innocent,\" will be cursed by many people and denounced by the nations."],
    ["25", "But blessings are showered on those who convict the guilty."],
    ["26", "It is an honor to receive an honest reply."],
    ["27", "Develop your business first before building your house."],
    ["28", "Do not testify spitefully against innocent neighbors; don't lie about them."],
    ["29", "And don't say, \"Now I can pay them back for all their meanness to me! I'll get even!\""]
  ],
  25: [
    ["1", "These are more proverbs of Solomon, collected by the advisers of King Hezekiah of Judah."],
    ["2", "It is God's privilege to conceal things and the king's privilege to discover them."],
    ["3", "No one can discover the height of heaven, the depth of the earth, or all that goes on in the king's mind!"],
    ["4", "Remove the dross from silver, and the sterling will be ready for the silversmith."],
    ["5", "Remove the wicked from the king's court, and his reign will be made secure by justice."],
    ["6", "Don't demand an audience with the king or push for a place among the great."],
    ["7", "It is better to wait for an invitation than to be sent to the end of the line, publicly disgraced!"],
    ["8", "Just because you see something, don't be in a hurry to go to court. You might go down before your neighbors in shameful defeat."],
    ["9", "So discuss the matter with them privately. Don't tell anyone else,"],
    ["10", "or others may accuse you of gossip. Then you will never regain your good reputation."],
    ["11", "Timely advice is as lovely as golden apples in a silver basket."],
    ["12", "Valid criticism is as treasured by the one who heeds it as jewelry made from finest gold."],
    ["13", "Faithful messengers are as refreshing as snow in the heat of summer. They revive the spirit of their employer."],
    ["14", "A person who doesn't give a promised gift is like clouds and wind that don't bring rain."],
    ["15", "Patience can persuade a prince, and soft speech can crush strong opposition."],
    ["16", "Do you like honey? Don't eat too much of it, or it will make you sick!"],
    ["17", "Don't visit your neighbors too often, or you will wear out your welcome."],
    ["18", "Telling lies about others is as harmful as hitting them with an ax, wounding them with a sword, or shooting them with a sharp arrow."],
    ["19", "Putting confidence in an unreliable person is like chewing with a toothache or walking on a broken foot."],
    ["20", "Singing cheerful songs to a person whose heart is heavy is as bad as stealing someone's jacket in cold weather or rubbing salt in a wound."],
    ["21", "If your enemies are hungry, give them food to eat. If they are thirsty, give them water to drink."],
    ["22", "You will heap burning coals on their heads, and the LORD will reward you."],
    ["23", "As surely as a wind from the north brings rain, so a gossiping tongue causes anger!"],
    ["24", "It is better to live alone in the corner of an attic than with a contentious wife in a lovely home."],
    ["25", "Good news from far away is like cold water to the thirsty."],
    ["26", "If the godly compromise with the wicked, it is like polluting a fountain or muddying a spring."],
    ["27", "Just as it is not good to eat too much honey, it is not good for people to think about all the honors they deserve."],
    ["28", "A person without self-control is as defenseless as a city with broken-down walls."]
  ],
  26: [
    ["1", "Honor doesn't go with fools any more than snow with summer or rain with harvest."],
    ["2", "Like a fluttering sparrow or a darting swallow, an unfair curse will not land on its intended victim."],
    ["3", "Guide a horse with a whip, a donkey with a bridle, and a fool with a rod to his back!"],
    ["4", "When arguing with fools, don't answer their foolish arguments, or you will become as foolish as they are."],
    ["5", "When arguing with fools, be sure to answer their foolish arguments, or they will become wise in their own estimation."],
    ["6", "Trusting a fool to convey a message is as foolish as cutting off one's feet or drinking poison!"],
    ["7", "In the mouth of a fool, a proverb becomes as limp as a paralyzed leg."],
    ["8", "Honoring a fool is as foolish as tying a stone to a slingshot."],
    ["9", "A proverb in a fool's mouth is as dangerous as a thornbush brandished by a drunkard."],
    ["10", "An employer who hires a fool or a bystander is like an archer who shoots recklessly."],
    ["11", "As a dog returns to its vomit, so a fool repeats his folly."],
    ["12", "There is more hope for fools than for people who think they are wise."],
    ["13", "The lazy person is full of excuses, saying, \"I can't go outside because there might be a lion on the road! Yes, I'm sure there's a lion out there!\""],
    ["14", "As a door turns back and forth on its hinges, so the lazy person turns over in bed."],
    ["15", "Some people are so lazy that they won't lift a finger to feed themselves."],
    ["16", "Lazy people consider themselves smarter than seven wise counselors."],
    ["17", "Yanking a dog's ears is as foolish as interfering in someone else's argument."],
    ["18–19", "Just as damaging as a mad man shooting a lethal weapon is someone who lies to a friend and then says, \"I was only joking.\""],
    ["20", "Fire goes out for lack of fuel, and quarrels disappear when gossip stops."],
    ["21", "A quarrelsome person starts fights as easily as hot embers light charcoal or fire lights wood."],
    ["22", "What dainty morsels rumors are—but they sink deep into one's heart."],
    ["23", "Smooth words may hide a wicked heart, just as a pretty glaze covers a common clay pot."],
    ["24", "People with hate in their hearts may sound pleasant enough, but don't believe them."],
    ["25", "Though they pretend to be kind, their hearts are full of all kinds of evil."],
    ["26", "While their hatred may be concealed by trickery, it will finally come to light for all to see."],
    ["27", "If you set a trap for others, you will get caught in it yourself. If you roll a boulder down on others, it will roll back and crush you."],
    ["28", "A lying tongue hates its victims, and flattery causes ruin."]
  ],
  27: [
    ["1", "Don't brag about tomorrow, since you don't know what the day will bring."],
    ["2", "Don't praise yourself; let others do it!"],
    ["3", "A stone is heavy and sand is weighty, but the resentment caused by a fool is heavier than both."],
    ["4", "Anger is cruel, and wrath is like a flood, but who can survive the destructiveness of jealousy?"],
    ["5", "An open rebuke is better than hidden love!"],
    ["6", "Wounds from a friend are better than many kisses from an enemy."],
    ["7", "Honey seems tasteless to a person who is full, but even bitter food tastes sweet to the hungry."],
    ["8", "A person who strays from home is like a bird that strays from its nest."],
    ["9", "The heartfelt counsel of a friend is as sweet as perfume and incense."],
    ["10", "Never abandon a friend—either yours or your father's. Then in your time of need, you won't have to ask your relatives for assistance. It is better to go to a neighbor than to a relative who lives far away."],
    ["11", "My child, how happy I will be if you turn out to be wise! Then I will be able to answer my critics."],
    ["12", "A prudent person foresees the danger ahead and takes precautions. The simpleton goes blindly on and suffers the consequences."],
    ["13", "Be sure to get collateral from anyone who guarantees the debt of a stranger. Get a deposit if someone guarantees the debt of an adulterous woman."],
    ["14", "If you shout a pleasant greeting to your neighbor too early in the morning, it will be counted as a curse!"],
    ["15", "A nagging wife is as annoying as the constant dripping on a rainy day."],
    ["16", "Trying to stop her complaints is like trying to stop the wind or hold something with greased hands."],
    ["17", "As iron sharpens iron, a friend sharpens a friend."],
    ["18", "Workers who tend a fig tree are allowed to eat its fruit. In the same way, workers who protect their employer's interests will be rewarded."],
    ["19", "As a face is reflected in water, so the heart reflects the person."],
    ["20", "Just as Death and Destruction are never satisfied, so human desire is never satisfied."],
    ["21", "Fire tests the purity of silver and gold, but a person is tested by being praised."],
    ["22", "You cannot separate fools from their foolishness, even though you grind them like grain with mortar and pestle."],
    ["23", "Know the state of your flocks, and put your heart into caring for your herds,"],
    ["24", "for riches don't last forever, and the crown might not be secure for the next generation."],
    ["25", "After the hay is harvested, the new crop appears, and the mountain grasses are gathered in,"],
    ["26", "your sheep will provide wool for clothing, and your goats will be sold for the price of a field."],
    ["27", "And you will have enough goats' milk for you, your family, and your servants."]
  ],
  28: [
    ["1", "The wicked run away when no one is chasing them, but the godly are as bold as lions."],
    ["2", "When there is moral rot within a nation, its government topples easily. But with wise and knowledgeable leaders, there is stability."],
    ["3", "A poor person who oppresses the poor is like a pounding rain that destroys the crops."],
    ["4", "To reject the law is to praise the wicked; to obey the law is to fight them."],
    ["5", "Evil people don't understand justice, but those who follow the LORD understand completely."],
    ["6", "It is better to be poor and honest than rich and crooked."],
    ["7", "Young people who obey the law are wise; those who seek out worthless companions bring shame to their parents."],
    ["8", "A person who makes money by charging interest will lose it. It will end up in the hands of someone who is kind to the poor."],
    ["9", "The prayers of a person who ignores the law are despised."],
    ["10", "Those who lead the upright into sin will fall into their own trap, but the honest will inherit good things."],
    ["11", "Rich people picture themselves as wise, but their real poverty is evident to the poor."],
    ["12", "When the godly succeed, everyone is glad. When the wicked take charge, people go into hiding."],
    ["13", "People who cover over their sins will not prosper. But if they confess and forsake them, they will receive mercy."],
    ["14", "Blessed are those who have a tender conscience, but the stubborn are headed for serious trouble."],
    ["15", "A wicked ruler is as dangerous to the poor as a lion or bear attacking them."],
    ["16", "Only a stupid prince will oppress his people, but a king will have a long reign if he hates dishonesty and bribes."],
    ["17", "A murderer's tormented conscience will drive him into the grave. Don't protect him!"],
    ["18", "The honest will be rescued from harm, but those who are crooked will be destroyed."],
    ["19", "Hard workers have plenty of food; playing around brings poverty."],
    ["20", "The trustworthy will get a rich reward. But the person who wants to get rich quick will only get into trouble."],
    ["21", "Showing partiality is never good, yet some will do wrong for something as small as a piece of bread."],
    ["22", "A greedy person tries to get rich quick, but it only leads to poverty."],
    ["23", "In the end, people appreciate frankness more than flattery."],
    ["24", "Robbing your parents and then saying, \"What's wrong with that?\" is as serious as committing murder."],
    ["25", "Greed causes fighting; trusting the LORD leads to prosperity."],
    ["26", "Trusting oneself is foolish, but those who walk in wisdom are safe."],
    ["27", "Whoever gives to the poor will lack nothing. But a curse will come upon those who close their eyes to poverty."],
    ["28", "When the wicked take charge, people hide. When the wicked meet disaster, the godly multiply."]
  ],
  29: [
    ["1", "Whoever stubbornly refuses to accept criticism will suddenly be broken beyond repair."],
    ["2", "When the godly are in authority, the people rejoice. But when the wicked are in power, they groan."],
    ["3", "The man who loves wisdom brings joy to his father, but if he hangs around with prostitutes, his wealth is wasted."],
    ["4", "A just king gives stability to his nation, but one who demands bribes destroys it."],
    ["5", "To flatter people is to lay a trap for their feet."],
    ["6", "Evil people are trapped by sin, but the righteous escape, shouting for joy."],
    ["7", "The godly know the rights of the poor; the wicked don't care to know."],
    ["8", "Mockers can get a whole town agitated, but those who are wise will calm anger."],
    ["9", "If a wise person takes a fool to court, there will be ranting and ridicule but no satisfaction."],
    ["10", "The bloodthirsty hate the honest, but the upright seek out the honest."],
    ["11", "A fool gives full vent to anger, but a wise person quietly holds it back."],
    ["12", "If a ruler honors liars, all his advisers will be wicked."],
    ["13", "The poor and the oppressor have this in common—the LORD gives light to the eyes of both."],
    ["14", "A king who is fair to the poor will have a long reign."],

const CHAPTER_NAMES = {
  1:"One",2:"Two",3:"Three",4:"Four",5:"Five",6:"Six",7:"Seven",8:"Eight",9:"Nine",
  10:"Ten",11:"Eleven",12:"Twelve",13:"Thirteen",14:"Fourteen",15:"Fifteen",
  16:"Sixteen",17:"Seventeen",18:"Eighteen",19:"Nineteen",20:"Twenty",
  21:"Twenty-One",22:"Twenty-Two",23:"Twenty-Three",24:"Twenty-Four",25:"Twenty-Five",
  26:"Twenty-Six",27:"Twenty-Seven",28:"Twenty-Eight",29:"Twenty-Nine",30:"Thirty",31:"Thirty-One"
};

const today = new Date().getDate(); // 1-31
let currentDay = today;

function render() {
  const ch = CHAPTERS[currentDay];
  document.getElementById('chapterTitle').textContent = 'Chapter ' + CHAPTER_NAMES[currentDay];
  document.getElementById('dayNumber').textContent = currentDay;

  const container = document.getElementById('versesContainer');
  container.innerHTML = '';
  ch.forEach(([num, text]) => {
    const div = document.createElement('div');
    div.className = 'verse';
    div.innerHTML = `<span class="verse-num">${num}</span>${text}`;
    container.appendChild(div);
  });

  document.getElementById('prevBtn').disabled = currentDay <= 1;
  document.getElementById('nextBtn').disabled = currentDay >= 31;

  // Update dots
  document.querySelectorAll('.dot').forEach(d => {
    const n = parseInt(d.dataset.day);
    d.classList.toggle('active', n === currentDay);
    d.classList.toggle('today', n === today && n !== currentDay);
  });

  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function navigate(dir) {
  const next = currentDay + dir;
  if (next >= 1 && next <= 31) {
    currentDay = next;
    render();
  }
}

function goToToday() {
  currentDay = today;
  render();
}

function buildDots() {
  const row = document.getElementById('dotRow');
  for (let i = 1; i <= 31; i++) {
    const d = document.createElement('div');
    d.className = 'dot';
    d.dataset.day = i;
    d.textContent = i;
    d.title = 'Proverbs ' + i;
    d.onclick = () => { currentDay = i; render(); };
    row.appendChild(d);
  }
}

buildDots();
render();
</script>
